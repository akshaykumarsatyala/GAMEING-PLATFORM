version: '3.8'

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://db:27017/gaming-forum
      - JWT_SECRET=your-secret-key
      - CLOUDINARY_CLOUD_NAME=your-cloud-name
      - CLOUDINARY_API_KEY=your-api-key
      - CLOUDINARY_API_SECRET=your-api-secret
      - CLIENT_URL=http://localhost:3000
      - PORT=5000
    depends_on:
      - db
    networks:
      - app-network

  db:
    image: mongo:latest
    volumes:
      - dbdata:/data/db
    networks:
      - app-network

volumes:
  dbdata:

networks:
  app-network:
    driver: bridge
